name: Lux CI Proof

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lux

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.x'
          otp-version: '27.x'

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            lux/deps
            lux/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('lux/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install deps
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Compile
        run: MIX_ENV=test mix compile --warnings-as-errors

      - name: Targeted tests
        run: |
          mix test \
            test/unit/lux/prisms/discord/channel_management_prism_test.exs \
            test/unit/lux/prisms/discord/event_handling_prism_test.exs \
            test/unit/lux/prisms/discord/message_management_prism_test.exs \
            test/unit/lux/prisms/discord/moderation_prism_test.exs
